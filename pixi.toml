[workspace]
authors = ["Michael Tran <michaelcao-anh.tran@uhn.ca>"]
channels = ["conda-forge", "bioconda"]
name = "Novartis_PDXE"
platforms = ["osx-arm64"]
version = "0.1.0"

[dependencies]
r-essentials = ">=4.5,<5"
python = ">=3.13.12,<3.14"
snakemake = ">=9.17.2,<10"
r-biocmanager = ">=1.30.27,<2"
r-remotes = ">=2.5.0,<3"
r-fs = ">=1.6.6,<2"
r-patchwork = ">=1.3.2,<2"

[tasks]
setup = "Rscript workflow/scripts/setup.R"
qc = "Rscript -e \"rmarkdown::render('qc/novartis_pdxe_xeva_qc.Rmd', output_file = 'novartis_pdxe_xeva_qc.html', output_dir = 'qc', knit_root_dir = getwd())\""
zip-tables = "bash -lc 'set -euo pipefail; COPYFILE_DISABLE=1 tar --exclude=\"Xeva_PDXE_tsv/.snakemake_timestamp\" -C results -cf - Xeva_PDXE_tsv | gzip -9 > results/Xeva_PDXE_tsv.tar.gz'"
